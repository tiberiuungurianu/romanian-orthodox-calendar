name: Update Orthodox Calendar

on:
  schedule:
    # First day of each month at 05:00 UTC
    - cron: "0 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate calendar.ics
        run: python scrape.py

      - name: Commit and push if calendar changed
        run: |
          if git diff --quiet calendar.ics; then
            echo "No changes to calendar.ics"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          git commit -m "$(cat <<'EOF'
chore: refresh Romanian Orthodox calendar (rolling 12 months)

Automated monthly update from CrestinOrtodox.ro.
EOF
)"
          git push
